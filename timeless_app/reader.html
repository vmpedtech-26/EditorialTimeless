<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Timeless — Lector</title>
  <meta name="description" content="Timeless Editorial — Lector de libros exclusivo." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Inter:wght@300;400;500;600&family=Lora:ital,wght@0,400;0,500;1,400&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Merriweather:ital,wght@0,300;0,400;0,700;1,300;1,400&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="assets/css/reader.css" />
  
  <!-- PWA & Apple Web App Meta -->
  <link rel="manifest" href="manifest.json" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Timeless" />
  <link class="apple-touch-icon" rel="apple-touch-icon" href="assets/cover_memoria.png" />
</head>

<body>
  <div id="progress-bar"></div>
  <div id="panel-overlay"></div>

  <header>
    <button class="icon-btn" id="btn-back"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></button>
    <div class="top-center">
      <div class="top-title" id="top-title">Timeless</div>
      <div class="top-ch" id="top-ch">Capítulo I</div>
    </div>
    <div style="display:flex; gap:10px;">
      <button class="icon-btn" id="btn-toc" title="Índice"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><circle cx="3" cy="6" r="1"/><circle cx="3" cy="12" r="1"/><circle cx="3" cy="18" r="1"/></svg></button>
      <button class="icon-btn" id="btn-notes" title="Mis Notas"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg></button>
      <button class="icon-btn" id="btn-settings" title="Apariencia"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></button>
    </div>
  </header>

  <aside class="side-panel" id="toc-panel">
    <div class="settings-label">Índice</div>
    <div id="chapter-list"></div>
  </aside>

  <aside class="side-panel" id="settings-panel">
    <div class="settings-row">
      <div class="settings-label">Apariencia</div>
      <div class="theme-grid">
        <button class="theme-btn theme-paper" data-theme="paper" title="Papel"></button>
        <button class="theme-btn theme-sepia" data-theme="sepia" title="Sepia"></button>
        <button class="theme-btn theme-slate" data-theme="slate" title="Pizarra"></button>
        <button class="theme-btn theme-night" data-theme="night" title="Noche"></button>
        <button class="theme-btn theme-deep"  data-theme="deep"  title="OLED"></button>
      </div>
    </div>
    <div class="settings-row">
      <div class="settings-label">Tipografía</div>
      <div class="font-grid">
        <button class="font-option active" data-font="serif">Classic</button>
        <button class="font-option" data-font="lora">Lora</button>
        <button class="font-option" data-font="garamond">Garamond</button>
        <button class="font-option" data-font="merri">Merriweather</button>
      </div>
    </div>
    <div class="settings-row">
      <div class="settings-label">Tamaño de Texto</div>
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <button class="btn-nav" id="btn-fs-dec">−</button>
        <span id="fs-val">19px</span>
        <button class="btn-nav" id="btn-fs-inc">+</button>
      </div>
    </div>
    <div class="settings-row">
      <div class="settings-label">Interlineado</div>
      <div style="display:flex; justify-content:space-between; align-items:center; gap:8px;">
        <button class="font-option" id="btn-lh-compact" data-lh="1.5">Compacto</button>
        <button class="font-option active" id="btn-lh-medium" data-lh="1.85">Normal</button>
        <button class="font-option" id="btn-lh-generous" data-lh="2.2">Amplio</button>
      </div>
    </div>
    <div class="settings-row">
      <div class="settings-label">Margen de Lectura</div>
      <div style="display:flex; justify-content:space-between; align-items:center; gap:8px;">
        <button class="font-option" id="btn-w-narrow" data-w="600px">Estrecho</button>
        <button class="font-option active" id="btn-w-medium" data-w="720px">Normal</button>
        <button class="font-option" id="btn-w-wide" data-w="880px">Ancho</button>
      </div>
    </div>
  </aside>

  <aside class="side-panel" id="notes-panel">
    <div class="settings-label">Mis Notas & Subrayados</div>
    <div id="notes-list" style="margin-top: 15px; display: flex; flex-direction: column; gap: 15px;">
      <!-- Highlights will appear here -->
    </div>
  </aside>

  <div id="highlight-tooltip" class="highlight-tooltip">
    <button id="btn-add-highlight">Destacar</button>
  </div>

  <main id="reading-content"></main>

  <nav class="nav-bottom">
    <button class="btn-nav" id="btn-prev" disabled>Anterior</button>
    <div style="text-align:center;">
      <div id="nav-info" style="font-size:11px; color:var(--text-muted);">Capítulo 1 de 1</div>
      <div id="nav-title" style="font-weight:600; font-size:13px;">...</div>
    </div>
    <button class="btn-nav" id="btn-next">Siguiente</button>
  </nav>

  <div id="reading-timer">
    <span id="timer-val">0:00</span>
  </div>

  <script type="module" src="assets/js/reader.js"></script>
  <!-- Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then(reg => console.log('  ✦ [PWA] Service Worker registrado con éxito:', reg.scope))
          .catch(err => console.error('  ✗ [PWA] Fallo al registrar Service Worker:', err));
      });
    }
  </script>
</body>
</html>
