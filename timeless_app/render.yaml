services:
  - type: web
    name: timeless-editorial
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: GEMINI_API_KEY
        sync: false # Debes configurarlo manualmente en el dashboard de Render
      - key: STRIPE_SECRET_KEY
        sync: false # Debes configurarlo manualmente en el dashboard de Render
      - key: STRIPE_WEBHOOK_SECRET
        sync: false # Debes configurarlo manualmente en el dashboard de Render
      - key: FIREBASE_SERVICE_ACCOUNT
        sync: false # Debes pegar el contenido del JSON de Firebase aquí en Render
